<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Archive</title>
<meta name="theme-color" content="#d8eeff" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Archive" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --c-primary: #4682b4;
    --c-body:    #4a72b0;
    --c-sub:     #7a96c0;
    --c-muted:   #9aaabb;
    --c-danger:  #c07080;
    --c-bg-card: rgba(255,255,255,0.93);
    --c-bg-chip: #eef4ff;
    --c-border:  #d8e8f8;
    --c-shadow:  rgba(180,208,240,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #d8eeff 0%, #e8f4ff 50%, #f0f8ff 100%);
    display: flex;
    justify-content: center;
    font-family: 'Noto Sans KR', 'Hiragino Kaku Gothic ProN', sans-serif;
  }
  #app { width: 100%; max-width: 430px; padding: 0 16px; }

  /* HEADER */
  .header { display: flex; justify-content: space-between; align-items: center; padding-top: max(20px, env(safe-area-inset-top)); padding-bottom: 8px; }
  .header-sub { font-size: 12.5px; color: var(--c-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: -4px; }
  .header-title { font-size: 26px; font-weight: 800; color: var(--c-primary); }
  .add-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--c-grad-light, #7ab8f8), var(--c-primary));
    border: none; color: #fff; font-size: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px var(--c-shadow); line-height: 1;
  }

  /* SEARCH */
  .search-wrap {
    display: flex; align-items: center; background: var(--c-bg-card);
    border-radius: 16px; padding: 10px 16px; margin-top: 16px;
    box-shadow: 0 2px 12px var(--c-shadow); gap: 8px;
  }
  .search-input { border: none; outline: none; font-size: 14px; color: var(--c-primary); background: transparent; flex: 1; font-family: inherit; }

  /* FILTER */
  .filter-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .filter-chip { padding: 6px 14px; border-radius: 20px; border: none; font-size: 12px; cursor: pointer; font-family: inherit; }
  .tag-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 12px; scrollbar-width: none; }
  .tag-scroll::-webkit-scrollbar { display: none; }
  .tag-inner { display: flex; gap: 8px; padding-bottom: 4px; width: max-content; }
  .tag-filter { padding: 5px 13px; border-radius: 20px; border: none; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; }

  /* STATS */
  .stats-row { display: flex; gap: 10px; margin-top: 16px; align-items: stretch; }
  .stat-box { flex: 1; background: var(--c-bg-card); border-radius: 16px; padding: 12px 0; text-align: center; box-shadow: 0 2px 10px var(--c-shadow); display: flex; flex-direction: column; justify-content: center; }
  .stat-num { font-size: 22px; font-weight: 800; line-height: 1.2; }
  .stat-label { font-size: 11px; color: var(--c-sub); margin-top: 2px; }

  /* CARD */
  .card-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
  .card {
    background: var(--c-bg-card); border-radius: 20px; padding: 14px;
    display: flex; gap: 12px; align-items: center;
    box-shadow: 0 3px 14px var(--c-shadow); cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:active { transform: scale(0.98); }
  .card-accent { width: 5px; height: 60px; border-radius: 4px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--c-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-circle { font-size: 12px; color: var(--c-sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
  .card-tag { font-size: 10px; background: var(--c-bg-chip); color: var(--c-body); padding: 2px 8px; border-radius: 10px; }
  .card-right { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .card-fav { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }
  .card-status { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .empty { text-align: center; color: var(--c-sub); padding: 48px 0; font-size: 15px; }

  /* DETAIL */
  .top-bar { display: flex; justify-content: space-between; align-items: stretch; padding-top: max(20px, env(safe-area-inset-top)); padding-bottom: 16px; gap: 10px; }
  .nav-btn {
    background: var(--c-bg-card); color: var(--c-body);
    border: none; border-radius: 16px;
    padding: 8px 16px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 2px 10px var(--c-shadow);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
  }
  .fav-btn { background: none; border: none; font-size: 26px; cursor: pointer; padding: 0; line-height: 1; }
  .detail-info { text-align: center; }
  .detail-title { font-size: 22px; font-weight: 800; color: var(--c-primary); line-height: 1.3; }
  .circle-chip { display: inline-block; margin-top: 10px; background: var(--c-bg-chip); color: var(--c-sub); padding: 6px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .status-chip { display: inline-block; padding: 5px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .date-row { display: flex; align-items: center; background: var(--c-bg-card); border-radius: 18px; padding: 14px 0; margin-top: 18px; box-shadow: 0 2px 10px var(--c-shadow); }
  .date-box { flex: 1; text-align: center; }
  .date-label { font-size: 11px; color: var(--c-muted); margin-bottom: 4px; }
  .date-val { font-size: 14px; font-weight: 700; color: var(--c-primary); }
  .date-divider { width: 1px; height: 36px; background: var(--c-border); }
  .section { margin-top: 20px; text-align: left; }
  .section-label { font-size: 11px; color: var(--c-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; padding-left: 4px; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-chip { background: var(--c-bg-chip); color: var(--c-body); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .memo-box { background: var(--c-bg-card); border-radius: 18px; padding: 16px; margin-top: 18px; text-align: left; border: 1.5px solid var(--c-border); }
  .memo-text { font-size: 14px; color: var(--c-body); line-height: 1.7; }
  .link-btn { display: block; margin-top: 20px; background: linear-gradient(135deg, var(--c-grad-light, #7ab8f8), var(--c-primary)); color: #fff; padding: 14px 0; border-radius: 18px; text-decoration: none; font-weight: 700; font-size: 15px; box-shadow: 0 4px 16px var(--c-shadow); text-align: center; }

  /* STARS */
  .stars { display: flex; gap: 2px; }
  .star { line-height: 1; user-select: none; }
  .star[data-star] { cursor: pointer; }

  /* ADD FORM */
  .add-page-title { font-size: 16px; font-weight: 700; color: var(--c-primary); }
  .form-wrap { padding-top: 8px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; color: var(--c-sub); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }
  .form-input {
    width: 100%; background: var(--c-bg-card); border: 1.5px solid var(--c-border);
    border-radius: 14px; padding: 11px 14px; font-size: 14px; color: var(--c-primary);
    outline: none; font-family: inherit;
  }
  .form-input::placeholder { color: var(--c-border); opacity: 1; }
  .form-input:focus { border-color: var(--c-primary); }
  textarea.form-input { height: 80px; resize: none; }
  .status-toggle-row { display: flex; gap: 8px; }
  .status-toggle { flex: 1; padding: 9px 0; border-radius: 14px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--c-border); font-family: inherit; }
  .add-confirm-btn {
    width: 100%; background: linear-gradient(135deg, var(--c-grad-light, #7ab8f8), var(--c-primary));
    color: #fff; border: none; border-radius: 18px; padding: 15px 0;
    font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
    box-shadow: 0 4px 16px var(--c-shadow); font-family: inherit;
  }
  .spacer { height: 40px; }

  /* THEME MODAL */
  .gear-btn { background: none; border: none; cursor: pointer; padding: 4px; line-height: 1; opacity: 0.45; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.2s; }
  .gear-btn:hover { opacity: 1; transform: scale(1.15); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .theme-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.15); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .theme-modal { background: #fff; border-radius: 24px; padding: 24px; width: 260px; box-shadow: 0 8px 32px var(--c-shadow); box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column; gap: 12px; }
  .theme-modal-title { font-size: 15px; font-weight: 800; color: var(--c-primary); }
  .theme-hex-row { display: flex; gap: 8px; align-items: center; width: 100%; box-sizing: border-box; }
  .theme-preview { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; border: 1.5px solid var(--c-border); }
  .theme-hex-input { width: 0; flex: 1; min-width: 0; background: var(--c-bg-chip); border: 1.5px solid var(--c-border); border-radius: 12px; padding: 9px 12px; font-size: 14px; color: var(--c-primary); outline: none; font-family: inherit; font-weight: 600; }
  .theme-hex-input:focus { border-color: var(--c-primary); }
  .theme-confirm-btn { width: 100%; background: linear-gradient(135deg, var(--c-grad-light, #7ab8f8), var(--c-primary)); color: #fff; border: none; border-radius: 14px; padding: 11px 0; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; box-sizing: border-box; }
  .theme-history-label { font-size: 11px; color: var(--c-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
  .theme-history-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .theme-swatch { width: 28px; height: 28px; border-radius: 8px; border: 2px solid rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.1s; }
  .theme-swatch:hover { transform: scale(1.15); }
  .theme-modal-close { display: block; width: 100%; background: none; border: 1.5px solid var(--c-border); border-radius: 14px; padding: 9px 0; font-size: 13px; font-weight: 600; color: var(--c-muted); cursor: pointer; font-family: inherit; box-sizing: border-box; }

  /* DELETE BTN */
  .delete-btn {
    display: block; width: 100%; margin-top: 12px;
    background: none; border: 1.5px solid rgba(192,112,128,0.4); border-radius: 18px;
    padding: 12px 0; font-size: 14px; font-weight: 600; color: var(--c-danger);
    cursor: pointer; font-family: inherit;
  }
  .delete-btn:active { background: rgba(192,112,128,0.06); }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── 상수 ──────────────────────────────────────────────
const STATUS_COLOR = { bg: 'var(--c-bg-chip)', text: 'var(--c-primary)' };
const STATUS_COLORS = { '청취완료': STATUS_COLOR, '청취중': STATUS_COLOR, '미청취': STATUS_COLOR };
// 카드 악센트 그라데이션 - 모두 CSS 변수 기반으로 테마 따라감
const GRADIENT_OFFSETS = [
  ['var(--c-sub)', 'var(--c-primary)'],
  ['var(--c-primary)', 'var(--c-grad-light)'],
  ['var(--c-grad-light)', 'var(--c-sub)'],
  ['var(--c-border)', 'var(--c-primary)'],
  ['var(--c-muted)', 'var(--c-grad-light)'],
];
const gradientFor = (id) => {
  const s = String(id);
  const num = s.charCodeAt(s.length - 1) + s.charCodeAt(s.length - 2);
  const [a, b] = GRADIENT_OFFSETS[num % GRADIENT_OFFSETS.length];
  return `linear-gradient(135deg, ${a} 0%, ${b} 100%)`;
};


const TITLE_KEY = 'hirame-title';
const SUBTITLE_KEY = 'hirame-subtitle';

// ── Supabase ──────────────────────────────────────────
const SUPA_URL = 'https://sxntdxtdrwuryhszzvqu.supabase.co';
const SUPA_KEY = 'sb_publishable_qoLykglXUNpR4AARxFcjBQ_bUH-g5g2';
const EDGE_WRITE_URL = SUPA_URL + '/functions/v1/cd-write';

// 읽기 전용 (anon key) - SELECT만 사용
async function supaFetch(method, path, body) {
  if (method !== 'GET') {
    throw new Error('직접 쓰기는 허용되지 않습니다. Edge Function을 사용하세요.');
  }
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
    },
    body: undefined
  });
  if (!res.ok) {
    const err = await res.text();
    alert('Supabase 오류 ' + res.status + ': ' + err);
    throw new Error(err);
  }
  return res.json();
}

// 쓰기 전용 (Edge Function 경유) - 비번 검증 포함
async function edgeWrite(action, payload) {
  const password = state._sessionPassword;
  if (!password) throw new Error('세션 비밀번호가 없습니다.');
  const res = await fetch(EDGE_WRITE_URL, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ password, action, payload })
  });
  const json = await res.json();
  if (!res.ok || !json.ok) {
    const msg = json.error || ('Edge Function 오류 ' + res.status);
    alert(msg);
    throw new Error(msg);
  }
  return json;
}

function cdToRow(cd) {
  return {
    id: String(cd.id),
    title: cd.title,
    circle: cd.circle,
    tags: Array.isArray(cd.tags) ? cd.tags.join(',') : (cd.tags || ''),
    release_date: cd.releaseDate || '',
    purchase_date: cd.purchaseDate || '',
    purchase_link: cd.purchaseLink || '',
    rj_code: cd.rjCode || '',
    memo: cd.memo || '',
    status: cd.status || '미청취',
    rating: cd.rating || 0
  };
}

function rowToCD(row) {
  return {
    id: row.id,
    title: row.title,
    circle: row.circle,
    tags: row.tags ? row.tags.split(',').filter(Boolean) : [],
    releaseDate: row.release_date || '',
    purchaseDate: row.purchase_date || '',
    purchaseLink: row.purchase_link || '',
    rjCode: row.rj_code || '',
    memo: row.memo || '',
    status: row.status || '미청취',
    rating: row.rating || 0,
  };
}

async function dbLoadCDs() {
  try {
    const rows = await supaFetch('GET', 'cds?order=created_at.desc');
    return Array.isArray(rows) ? rows.map(rowToCD) : [];
  } catch(e) {
    return [];
  }
}

async function dbAddCD(cd) {
  await edgeWrite('insert', cdToRow(cd));
}

async function dbUpdateCD(id, patch) {
  const row = {};
  if (patch.title !== undefined) row.title = patch.title;
  if (patch.circle !== undefined) row.circle = patch.circle;
  if (patch.tags !== undefined) row.tags = Array.isArray(patch.tags) ? patch.tags.join(',') : patch.tags;
  if (patch.releaseDate !== undefined) row.release_date = patch.releaseDate;
  if (patch.purchaseDate !== undefined) row.purchase_date = patch.purchaseDate;
  if (patch.purchaseLink !== undefined) row.purchase_link = patch.purchaseLink;
  if (patch.memo !== undefined) row.memo = patch.memo;
  if (patch.status !== undefined) row.status = patch.status;
  if (patch.rating !== undefined) row.rating = patch.rating;
  await edgeWrite('update', { id, patch: row });
}

async function dbDeleteCD(id) {
  await edgeWrite('delete', { id });
}

function loadTitle() {
  try { return localStorage.getItem(TITLE_KEY) || 'ひらめ Archive'; } catch(e) { return 'ひらめ Archive'; }
}
function loadSubtitle() {
  try { return localStorage.getItem(SUBTITLE_KEY) || 'Audio Drama Library'; } catch(e) { return 'Audio Drama Library'; }
}


// ── 인증 ──────────────────────────────────────────────
async function verifyPassword(input) {
  try {
    const res = await fetch(EDGE_WRITE_URL, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ password: input, action: 'verify', payload: {} })
    });
    const json = await res.json();
    if (res.status === 401) return false;
    if (json.ok) {
      // 검증 성공 시 세션에 비번 보관 (쓰기 요청에 재사용)
      state._sessionPassword = input;
      return true;
    }
    return false;
  } catch(e) { return false; }
}

function openAuthModal() {
  const existing = document.getElementById('auth-modal-bg');
  if (existing) existing.remove();
  const bg = document.createElement('div');
  bg.id = 'auth-modal-bg';
  bg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000';
  bg.innerHTML = `
    <div style="background:#fff;border-radius:24px;padding:24px;width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.15);display:flex;flex-direction:column;gap:12px">
      <div style="font-size:15px;font-weight:800;color:var(--c-primary)">🔒 편집 모드</div>
      <div style="font-size:13px;color:var(--c-muted)">비밀번호를 입력하세요</div>
      <form id="auth-form" onsubmit="return false" style="width:100%;display:flex;flex-direction:column;gap:12px"><input type="text" name="username" autocomplete="username" value="admin" style="display:none" /><input id="auth-pw-input" type="password" name="password" autocomplete="current-password" placeholder="비밀번호" style="background:var(--c-bg-chip);border:1.5px solid var(--c-border);border-radius:12px;padding:10px 14px;font-size:14px;outline:none;font-family:inherit;width:100%;box-sizing:border-box" /></form>
      <div id="auth-error" style="font-size:12px;color:#e07080;display:none">비밀번호가 틀렸어요</div>
      <button id="auth-confirm" style="background:linear-gradient(135deg,var(--c-grad-light,#7ab8f8),var(--c-primary));color:#fff;border:none;border-radius:14px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">확인</button>
      <button id="auth-cancel" style="background:none;border:1.5px solid var(--c-border);border-radius:14px;padding:9px;font-size:13px;font-weight:600;color:var(--c-muted);cursor:pointer;font-family:inherit">취소</button>
    </div>
  `;
  document.body.appendChild(bg);
  const input = document.getElementById('auth-pw-input');
  input.focus();
  document.getElementById('auth-cancel').addEventListener('click', () => bg.remove());
  bg.addEventListener('click', e => { if (e.target === bg) bg.remove(); });
  document.getElementById('auth-confirm').addEventListener('click', async () => {
    const pw = input.value;
    const ok = await verifyPassword(pw);
    if (ok) {
      state.isAdmin = true;
      bg.remove();
      render();
    } else {
      document.getElementById('auth-error').style.display = 'block';
      input.value = '';
      input.focus();
    }
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-confirm').click();
  });
}


let state = {
  cds: [],
  view: 'library',
  selectedId: null,
  _sessionPassword: null,  // Edge Function 호출 시 사용, 메모리에만 존재
  filterTag: null,
  filterStatus: null,
  filterRating: null,
  searchQuery: '',
  form: emptyForm(),
  selectedStat: null,
  isAdmin: false,
};

function emptyForm() {
  return { title: '', circle: '', tags: '', releaseDate: '', purchaseDate: '', purchaseLink: '', rjCode: '', memo: '', status: '미청취', rating: 0 };
}

// ── THEME ──────────────────────────────────────────────
const THEME_HISTORY_KEY = 'hirame-theme-history';
const THEME_CURRENT_KEY = 'hirame-theme-current';

// 원래 디자인 기본값 (CSS :root 하드코딩값과 정확히 동일)
const DEFAULT_HEX = '#4682b4';
const DEFAULT_THEME = {
  '--c-primary':   '#4682b4',
  '--c-body':      '#4a72b0',
  '--c-sub':       '#7a96c0',
  '--c-muted':     '#9aaabb',
  '--c-border':    '#d8e8f8',
  '--c-bg-chip':   '#eef4ff',
  '--c-shadow':    'rgba(180,208,240,0.18)',
  '--c-grad-light':'#7ab8f8',
  'body-bg':       'linear-gradient(160deg, #d8eeff 0%, #e8f4ff 50%, #f0f8ff 100%)',
};

function hexToHsl(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.slice(0,2),16)/255;
  const g = parseInt(hex.slice(2,4),16)/255;
  const b = parseInt(hex.slice(4,6),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max===min) { h=s=0; }
  else {
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){ case r:h=((g-b)/d+(g<b?6:0))/6;break; case g:h=((b-r)/d+2)/6;break; case b:h=((r-g)/d+4)/6;break; }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToHex(h,s,l) {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; const c=l-a*Math.max(-1,Math.min(k-3,9-k,1)); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return '#'+f(0)+f(8)+f(4);
}

function applyTheme(hex, skipSave) {
  hex = hex.trim().toLowerCase();
  if (!/^#[0-9a-f]{6}$/.test(hex)) return false;

  const root = document.documentElement.style;

  // 기본색이면 하드코딩 원본값 그대로 복원
  if (hex === DEFAULT_HEX) {
    Object.entries(DEFAULT_THEME).forEach(([k, v]) => {
      if (k === 'body-bg') document.body.style.background = v;
      else root.setProperty(k, v);
    });
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#d8eeff');
  } else {
    const [h, s, l] = hexToHsl(hex);
    // 채도가 낮은 색(무채색 계열)도 파스텔이 맑게 나오도록 최소 채도 보장
    const sBase = Math.max(s, 35);
    // 밝기만 올리고 채도는 최대한 유지 → 회색끼 없는 맑은 파스텔
    root.setProperty('--c-primary',    hex);
    root.setProperty('--c-body',       hslToHex(h, sBase,           Math.min(l+6,  82)));
    root.setProperty('--c-sub',        hslToHex(h, Math.max(sBase-8,20),  Math.min(l+18, 82)));
    root.setProperty('--c-muted',      hslToHex(h, Math.max(sBase-15,20), Math.min(l+28, 82)));
    root.setProperty('--c-border',     hslToHex(h, Math.max(sBase-10,25), Math.min(l+36, 92)));
    root.setProperty('--c-bg-chip',    hslToHex(h, Math.max(sBase-5, 30), Math.min(l+44, 97)));
    root.setProperty('--c-shadow',     `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},0.18)`);
    root.setProperty('--c-grad-light', hslToHex(h, Math.max(sBase-5, 30), Math.min(l+16, 90)));
    // 배경도 채도 유지해서 맑은 파스텔로
    const bgColor = hslToHex(h, Math.max(sBase-5,30), Math.min(l+40,97));
    document.body.style.background = `linear-gradient(160deg, ${bgColor} 0%, ${hslToHex(h, Math.max(sBase-8,28), Math.min(l+44,98))} 50%, ${hslToHex(h, Math.max(sBase-10,25), Math.min(l+48,99))} 100%)`;
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', bgColor);
  }

  if (!skipSave) {
    saveThemeHistory(hex);
    try { localStorage.setItem(THEME_CURRENT_KEY, hex); } catch(e) {}
  }
  render();
  return true;
}

function loadSavedTheme() {
  try {
    const saved = localStorage.getItem(THEME_CURRENT_KEY);
    if (saved && /^#[0-9a-f]{6}$/.test(saved)) applyTheme(saved, true);
  } catch(e) {}
}

function saveThemeHistory(hex) {
  let history = getThemeHistory();
  history = [hex, ...history.filter(c=>c!==hex)].slice(0,6);
  try { localStorage.setItem(THEME_HISTORY_KEY, JSON.stringify(history)); } catch(e){}
}

function getThemeHistory() {
  try { return JSON.parse(localStorage.getItem(THEME_HISTORY_KEY)||'[]'); } catch(e){ return []; }
}

function setState(patch) {
  Object.assign(state, patch);
  render();
}

async function updateCD(id, patch) {
  state.cds = state.cds.map(cd => String(cd.id) === String(id) ? { ...cd, ...patch } : cd);
  await dbUpdateCD(id, patch);
  render();
}

async function handleAdd() {
  try {
    const f = state.form;
    const rj = (f.rjCode || '').trim().toUpperCase();
    const tagsRaw = Array.isArray(f.tags) ? f.tags.join(', ') : (f.tags || '');
    const purchaseLink = (f.purchaseLink || '').trim()
      ? f.purchaseLink.trim()
      : rj ? `https://www.dlsite.com/girls-touch/work/=/product_id/${rj}.html` : '';
    const newCD = {
      id: Date.now(),
      title: f.title || '제목 없음',
      circle: f.circle || '서클 없음',
      tags: tagsRaw.split(/[,，\s]+/).map(t => t.trim()).filter(Boolean),
      releaseDate: f.releaseDate || '',
      purchaseDate: f.purchaseDate || '',
      purchaseLink,
      memo: f.memo || '',
      status: f.status || '미청취',
      rating: f.rating || 0,
    };
    await dbAddCD(newCD);
    state.cds = [newCD, ...state.cds];
    state.form = emptyForm();
    state.view = 'library';
    render();
  } catch(e) {
    alert('추가 실패: ' + e.message);
  }
}

function handleEdit() {
  const cd = state.cds.find(c => String(c.id) === String(state.selectedId));
  if (!cd) return;
  const rjMatch = (cd.purchaseLink || '').match(/\/(RJ\d+)\.html/i);
  const rjCode = rjMatch ? rjMatch[1] : '';
  // DLsite URL이면 rjCode로, 아니면 직접 URL란에 표시
  const isDlsite = rjMatch !== null;
  state.form = {
    title: cd.title,
    circle: cd.circle,
    tags: cd.tags.join(', '),
    releaseDate: cd.releaseDate || '',
    purchaseDate: cd.purchaseDate || '',
    purchaseLink: isDlsite ? '' : (cd.purchaseLink || ''),
    rjCode,
    memo: cd.memo || '',
    status: cd.status,
    rating: cd.rating,
  };
  state.view = 'edit';
  render();
}

function handleEditSave() {
  const f = state.form;
  const id = state.selectedId;
  const rj = f.rjCode.trim().toUpperCase();
  const purchaseLink = f.purchaseLink.trim()
    ? f.purchaseLink.trim()
    : rj ? `https://www.dlsite.com/girls-touch/work/=/product_id/${rj}.html` : '';
  updateCD(id, {
    title: f.title || '제목 없음',
    circle: f.circle || '서클 없음',
    tags: f.tags.split(/[,，\s]+/).map(t => t.trim()).filter(Boolean),
    releaseDate: f.releaseDate,
    purchaseDate: f.purchaseDate,
    purchaseLink,
    memo: f.memo,
    status: f.status,
    rating: f.rating,
  });
  state.view = 'detail';
  render();
}

async function handleDelete(id) {
  await dbDeleteCD(id);
  state.cds = state.cds.filter(cd => cd.id !== id);
  state.view = 'library';
  state.selectedId = null;
  render();
}

let deleteConfirmId = null;
let deleteConfirmTimer = null;

function handleDeleteTap(id) {
  if (deleteConfirmId === id) {
    clearTimeout(deleteConfirmTimer);
    deleteConfirmId = null;
    handleDelete(id);
  } else {
    deleteConfirmId = id;
    const btn = document.querySelector('[data-delete]');
    if (btn) { btn.textContent = '한 번 더 누르면 삭제'; btn.style.color = 'var(--c-danger)'; btn.style.borderColor = 'var(--c-danger)'; }
    deleteConfirmTimer = setTimeout(() => {
      deleteConfirmId = null;
      render();
    }, 2500);
  }
}

// ── 별점 HTML ──────────────────────────────────────────
const starSVG = (filled, size, color) =>
  `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${filled ? color : 'none'}" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;

function starsHTML(rating, size, editable, context) {
  const ctx = editable ? `data-stars-ctx="${context}"` : '';
  return `<div class="stars">${[1,2,3,4,5].map(s => {
    const color = s <= rating ? 'var(--c-primary)' : 'var(--c-border)';
    return `<span class="star" style="display:inline-flex;align-items:center" ${editable ? `data-star="${s}" ${ctx}` : ''}>${starSVG(s <= rating, size, color)}</span>`;
  }).join('')}</div>`;
}

// ── 렌더링 ────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.view === 'detail' && state.selectedId) {
    app.innerHTML = renderDetail();
  } else if (state.view === 'add') {
    app.innerHTML = renderAdd();
  } else if (state.view === 'edit') {
    app.innerHTML = renderEdit();
  } else {
    app.innerHTML = renderLibrary();
  }
  attachEvents();
}


// ── 필터 로직 (renderLibrary + 검색 이벤트 공유) ────────
function filterCDs(cds) {
  const { filterTag, filterStatus, filterRating, searchQuery, selectedStat } = state;
  return cds.filter(cd => {
    const matchTag    = filterTag     ? cd.tags.includes(filterTag)                      : true;
    const matchStatus = filterStatus  ? cd.status === filterStatus                       : true;
    const matchRating = filterRating !== null ? cd.rating === filterRating               : true;
    const matchSearch = !searchQuery
      || cd.title.toLowerCase().includes(searchQuery.toLowerCase())
      || cd.circle.toLowerCase().includes(searchQuery.toLowerCase());
    const matchStat   = !selectedStat || selectedStat === 'all'
      || (selectedStat === 'done' && cd.status === '청취완료')
      || (selectedStat === 'purchased' && !!cd.purchaseDate);
    return matchTag && matchStatus && matchRating && matchSearch && matchStat;
  });
}


// ── 카드 HTML 생성 (renderLibrary + 검색 재렌더 공유) ───
function cardHTML(cd) {
  const sc = STATUS_COLORS[cd.status];
  const visibleTags = cd.tags.slice(0,3).map(t=>`<span class="card-tag">#${t}</span>`).join('');
  const more = cd.tags.length > 3 ? `<span class="card-tag">+${cd.tags.length-3}</span>` : '';
  return `
    <div class="card" data-open="${cd.id}">
      <div class="card-accent" style="background:${gradientFor(cd.id)}"></div>
      <div class="card-info">
        <div class="card-title">${esc(cd.title)}</div>
        <div class="card-circle">✦ ${esc(cd.circle)}</div>
        <div class="card-tags">${visibleTags}${more}</div>
        <div style="margin-top:5px">${starsHTML(cd.rating, 13, false, `card-${cd.id}`)}</div>
      </div>
      <div class="card-right">
        <span class="card-status" style="background:var(--c-bg-chip);color:${cd.purchaseDate?'var(--c-primary)':'var(--c-muted)'}">${cd.purchaseDate?'구매':'미구매'}</span>
        <span class="card-status" style="background:${sc.bg};color:${sc.text}">${cd.status}</span>
      </div>
    </div>`;
}

        </button>
        ${state.isAdmin
          ? `<button class="add-btn" id="go-add"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>`
          : ''
        }
      </div>
    </div>
    <div class="search-wrap">
      <span style="display:flex;align-items:center;flex-shrink:0"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--c-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="search-input" id="search-input" placeholder="제목, 서클로 검색..." value="${esc(searchQuery)}" />
    </div>
    <div class="filter-row">${statusBtns}</div>
    <div class="tag-scroll"><div class="tag-inner">${tagBtns}</div></div>
    <div class="tag-scroll" style="margin-top:8px"><div class="tag-inner">${ratingBtns}</div></div>
    <div class="stats-row">
      ${stats.map(s => {
        const active = state.selectedStat === s.key;
        const bg = active ? 'var(--c-primary)' : 'var(--c-bg-card)';
        const numColor = active ? '#fff' : s.color;
        const lblColor = active ? 'rgba(255,255,255,0.8)' : 'var(--c-sub)';
        return `
        <button class="stat-box" style="background:${bg};cursor:pointer;border:none;font-family:inherit;" data-stat-key="${s.key}">
          <div class="stat-num" style="color:${numColor};font-weight:800">${s.num}</div>
          <div class="stat-label" style="color:${lblColor};font-weight:700">${s.label}</div>
        </button>`;
      }).join('')}
    </div>
    <div class="card-list">${cards}</div>
    <div class="spacer"></div>
  `;
}

// ── DETAIL ──────────────────────────────────────────
function renderDetail() {
  const cd = state.cds.find(c => String(c.id) === String(state.selectedId));
  if (!cd) { state.view = 'library'; return renderLibrary(); }
  const sc = STATUS_COLORS[cd.status];
  const tagsHTML = cd.tags.length > 0
    ? `<div class="section"><div class="section-label">태그</div><div class="tag-row">${cd.tags.map(t=>`<span class="tag-chip"># ${esc(t)}</span>`).join('')}</div></div>` : '';
  const memoHTML = cd.memo
    ? `<div class="memo-box"><div class="section-label" style="display:flex;align-items:center;gap:5px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--c-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/></svg>메모</div><p class="memo-text">${esc(cd.memo)}</p></div>` : '';
  const linkHTML = cd.purchaseLink
    ? `<a href="${esc(cd.purchaseLink)}" target="_blank" rel="noreferrer" class="link-btn">구매처 바로가기</a>` : '';

  return `
    <div class="top-bar">
      <button class="nav-btn" id="go-back">뒤로</button>
      ${state.isAdmin ? `<button class="nav-btn" id="go-edit">수정</button>` : ''}
    </div>
    <div class="detail-info">
      <h1 class="detail-title">${esc(cd.title)}</h1>
      <div class="circle-chip">✦ ${esc(cd.circle)}</div>
      <div style="display:flex;justify-content:center;margin-top:12px">
        <span class="status-chip" style="background:${sc.bg};color:${sc.text}">${cd.status}</span>
      </div>
      <div style="display:flex;justify-content:center;margin-top:14px">
        ${starsHTML(cd.rating, 28, false, `detail-${cd.id}`)}
      </div>
      <div class="date-row">
        <div class="date-box">
          <div class="date-label">발매일</div>
          <div class="date-val">${cd.releaseDate || '—'}</div>
        </div>
        <div class="date-divider"></div>
        <div class="date-box">
          <div class="date-label">구매일</div>
          <div class="date-val">${cd.purchaseDate || '—'}</div>
        </div>
      </div>
      ${tagsHTML}
      ${memoHTML}
      ${linkHTML}
      ${state.isAdmin ? `<button class="delete-btn" data-delete="${cd.id}">삭제하기</button>` : ''}
    </div>
    <div class="spacer"></div>
  `;
}

// ── ADD / EDIT 공통 폼 렌더 ─────────────────────────────
function renderForm(mode) {
  const f = state.form;
  const isEdit = mode === 'edit';
  const fields = [
    { label: '제목 *',  key: 'title',       placeholder: '작품 제목',              type: 'text' },
    { label: '서클명 *', key: 'circle',      placeholder: '서클 이름',             type: 'text' },
    { label: '태그',    key: 'tags',         placeholder: '달달, 연상, 집착 (쉼표로 구분)', type: 'text' },
    { label: '발매일',  key: 'releaseDate',  placeholder: '',                       type: 'date' },
    { label: '구매일',  key: 'purchaseDate', placeholder: '',                       type: 'date' },
  ];
  const inputsHTML = fields.map(({ label, key, placeholder, type }) => `
    <div class="form-group">
      <label class="form-label">${label}</label>
      <input class="form-input" type="${type}" placeholder="${placeholder}" value="${esc(f[key])}" data-form-key="${key}" />
    </div>`).join('');

  const rjPreview = f.rjCode.trim()
    ? `<div style="font-size:11px;color:var(--c-sub);margin-top:6px;padding-left:4px;word-break:break-all">https://www.dlsite.com/girls-touch/work/=/product_id/${esc(f.rjCode.trim().toUpperCase())}.html</div>` : '';

  const statusBtns = ['미청취','청취중','청취완료'].map(st => {
    const active = f.status === st;
    const sc = STATUS_COLORS[st];
    return `<button class="status-toggle" style="background:${active?sc.bg:'var(--c-bg-card)'};color:${active?sc.text:'var(--c-border)'};border:1.5px solid ${active?sc.text:'var(--c-border)'}" data-status-pick="${st}">${st}</button>`;
  }).join('');

  const backBtn  = isEdit ? `<button class="nav-btn" id="go-back-detail">취소</button>` : `<button class="nav-btn" id="go-back">취소</button>`;
  const saveBtn  = isEdit ? `<button class="add-confirm-btn" id="do-edit-save">✦ 저장하기</button>` : `<button class="add-confirm-btn" id="do-add">✦ 추가하기</button>`;

  return `
    <div class="top-bar">${backBtn}</div>
    <div class="form-wrap">
      ${inputsHTML}
      <div class="form-group">
        <label class="form-label">작품 번호 (RJ코드)</label>
        <input class="form-input" type="text" placeholder="RJ360371" value="${esc(f.rjCode)}" data-form-key="rjCode" />
        ${rjPreview}
      </div>
      <div class="form-group">
        <label class="form-label">구매처 URL (DLsite 외 다른 곳)</label>
        <input class="form-input" type="url" placeholder="https://booth.pm/..." value="${esc(f.purchaseLink)}" data-form-key="purchaseLink" />
      </div>
      <div class="form-group">
        <label class="form-label">청취 상태</label>
        <div class="status-toggle-row">${statusBtns}</div>
      </div>
      <div class="form-group">
        <label class="form-label">별점</label>
        ${starsHTML(f.rating, 28, true, 'form')}
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-input" placeholder="감상 메모를 적어봐요 ✎" data-form-key="memo">${esc(f.memo)}</textarea>
      </div>
      ${saveBtn}
    </div>
    <div class="spacer"></div>
  `;
}
function renderAdd()  { return renderForm('add');  }
function renderEdit() { return renderForm('edit'); }


// ── 카드 이벤트만 재연결 (검색 시 포커스 유지용) ────────
function attachCardEvents(container) {
  container.querySelectorAll('[data-open]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('[data-star]')) return;
      setState({ selectedId: card.dataset.open, view: 'detail' });
    });
  });
}

// ── 이벤트 연결 ──────────────────────────────────────
function attachEvents() {
  const app = document.getElementById('app');

  // 라이브러리 → 추가
  const goAdd = document.getElementById('go-add');
  const gearBtn = document.getElementById('gear-btn');
  if (gearBtn) gearBtn.addEventListener('click', () => {
    if (state.isAdmin) openThemeModal();
    else openAuthModal();
  });
  if (goAdd) goAdd.addEventListener('click', () => setState({ view: 'add', form: emptyForm() }));

  // 뒤로
  const goBack = document.getElementById('go-back');
  if (goBack) goBack.addEventListener('click', () => setState({ view: 'library' }));

  // 디테일로 돌아가기 (수정 취소)
  const goBackDetail = document.getElementById('go-back-detail');
  if (goBackDetail) goBackDetail.addEventListener('click', () => setState({ view: 'detail' }));

  // 수정 화면으로
  const goEdit = document.getElementById('go-edit');
  if (goEdit) goEdit.addEventListener('click', handleEdit);

  // 수정 저장
  const doEditSave = document.getElementById('do-edit-save');
  if (doEditSave) doEditSave.addEventListener('click', handleEditSave);

  // 추가 확정
  const doAdd = document.getElementById('do-add');
  if (doAdd) doAdd.addEventListener('click', handleAdd);

  // 검색
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', e => {
      state.searchQuery = e.target.value;
      // 전체 재렌더 대신 카드 리스트만 업데이트 → 포커스 유지
      const cardList = document.querySelector('.card-list');
      if (cardList) {
        const filtered = filterCDs(state.cds);
        cardList.innerHTML = filtered.length === 0 ? EMPTY_HTML : filtered.map(cardHTML).join('');
        // 새로 생긴 카드 이벤트 재연결
        attachCardEvents(cardList);
      }
    });
  }

  // 상태 필터
  app.querySelectorAll('[data-status-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.statusFilter;
      setState({ filterStatus: val === '' ? null : val });
    });
  });

  // 별점 필터
  app.querySelectorAll('[data-rating-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.ratingFilter;
      const next = val === '' ? null : Number(val);
      setState({ filterRating: state.filterRating === next ? null : next });
    });
  });

  // 태그 필터
  app.querySelectorAll('[data-tag-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.tagFilter;
      const next = (val === '' || state.filterTag === val) ? null : val;
      setState({ filterTag: next });
    });
  });

  // 카드 열기
  app.querySelectorAll('[data-open]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('[data-star]')) return;
      setState({ selectedId: card.dataset.open, view: 'detail' });
    });
  });


  // 별점 (폼에서만 편집 가능)
  app.querySelectorAll('[data-star]').forEach(star => {
    star.addEventListener('click', e => {
      e.stopPropagation();
      if (star.dataset.starsCtx === 'form') {
        const val = Number(star.dataset.star);
        state.form.rating = val === state.form.rating ? 0 : val;
        render();
      }
    });
  });

  // 폼 인풋
  app.querySelectorAll('[data-form-key]').forEach(input => {
    input.addEventListener('input', e => {
      state.form[input.dataset.formKey] = e.target.value;
    });
  });

  // 상태 선택 (추가 폼)
  app.querySelectorAll('[data-status-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.form.status = btn.dataset.statusPick;
      render();
    });
  });

  // 통계 박스
  app.querySelectorAll('[data-stat-key]').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.statKey;
      setState({ selectedStat: state.selectedStat === val ? null : val });
    });
  });

  // 삭제
  app.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => handleDeleteTap(Number(btn.dataset.delete)));
  });
}

// ── 유틸 ─────────────────────────────────────────────
function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── 초기 렌더 ─────────────────────────────────────────
loadSavedTheme();
state._loading = true;
render();
(async () => {
  try {
    const cds = await dbLoadCDs();
    state.cds = cds;
  } catch(e) {
    state.cds = [];
  } finally {
    state._loading = false;
    render();
  }
})();

// ── Service Worker 등록 ───────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
